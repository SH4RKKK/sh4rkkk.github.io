<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gym Log</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base:       #0f0f0f;
    --bg-card:       #1a1a1a;
    --bg-input:      #252525;
    --bg-hover:      #2e2e2e;
    --border:        #333;
    --border-light:  #2a2a2a;
    --text-primary:  #e8e8e8;
    --text-secondary:#999;
    --text-tertiary: #555;
    --accent-wed-bg: #0d2b24;
    --accent-wed-tx: #4ecca3;
    --accent-thu-bg: #1a1535;
    --accent-thu-tx: #9d8fef;
    --accent-sat-bg: #0d2b24;
    --accent-sat-tx: #4ecca3;
    --accent-sun-bg: #162508;
    --accent-sun-tx: #8bc34a;
    --badge-p-bg:    #2d2660;
    --badge-p-tx:    #b8adff;
    --badge-s-bg:    #2a2a2a;
    --badge-s-tx:    #aaa;
    --badge-st-bg:   #1e3a08;
    --badge-st-tx:   #8bc34a;
    --radius:        8px;
    --radius-sm:     4px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
  }

  .wrap { padding: 1rem; max-width: 1400px; margin: 0 auto; }

  .top-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .week-nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .week-label {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    min-width: 80px;
    text-align: center;
  }

  .date-label {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-right: 4px;
  }

  .top-btn {
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: var(--radius-sm);
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-primary);
    transition: background 0.15s;
    white-space: nowrap;
  }
  .top-btn:hover { background: var(--bg-hover); }
  .top-btn:disabled { opacity: 0.3; cursor: default; }
  .top-btn.export     { border-color: #4ecca3; color: #4ecca3; }
  .top-btn.import-btn { border-color: #9d8fef; color: #9d8fef; }

  .status-msg { font-size: 12px; color: var(--text-secondary); display: none; }
  .status-msg.ok  { color: #4ecca3; }
  .status-msg.err { color: #e05c5c; }

  #import-input { display: none; }

  /* ── Grid ── */
  .days-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }
  @media (max-width: 900px) { .days-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .days-grid { grid-template-columns: 1fr; } }

  /* ── Day card ── */
  .day-col {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .day-col.today {
    border-color: #ffffff22;
    box-shadow: 0 0 0 2px #ffffff18, 0 4px 24px #0008;
  }

  .day-header {
    padding: 10px 12px 8px;
    font-weight: 600;
    font-size: 13px;
    border-bottom: 1px solid var(--border-light);
    position: relative;
  }
  .day-header .sub { font-size: 11px; font-weight: 400; margin-top: 2px; opacity: 0.75; }

  .today-pip {
    display: none;
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 2px 6px;
    border-radius: 20px;
    background: #ffffff22;
    color: inherit;
    text-transform: uppercase;
  }
  .today .today-pip { display: inline-block; }

  .wed .day-header { background: var(--accent-wed-bg); color: var(--accent-wed-tx); }
  .thu .day-header { background: var(--accent-thu-bg); color: var(--accent-thu-tx); }
  .sat .day-header { background: var(--accent-sat-bg); color: var(--accent-sat-tx); }
  .sun .day-header { background: var(--accent-sun-bg); color: var(--accent-sun-tx); }

  /* ── Section ── */
  .section { padding: 8px 12px 6px; }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 6px;
  }
  .divider { height: 1px; background: var(--border-light); margin: 4px 12px; }

  /* ── Exercise row ── */
  .ex-row { margin-bottom: 10px; }
  .ex-name {
    font-size: 12px;
    color: var(--text-primary);
    margin-bottom: 4px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }
  .ex-name.sec { font-weight: 400; color: var(--text-secondary); }

  .col-header {
    font-size: 10px;
    color: var(--text-tertiary);
    margin-bottom: 3px;
    display: flex;
    gap: 4px;
    align-items: center;
  }

  /* ── Sets ── */
  .sets-row { display: flex; flex-direction: column; gap: 4px; }
  .set-block { display: flex; gap: 4px; align-items: center; }
  .set-num {
    font-size: 10px;
    color: var(--text-tertiary);
    width: 14px;
    text-align: right;
    flex-shrink: 0;
  }

  .set-input {
    font-size: 16px;
    padding: 3px 4px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-input);
    color: var(--text-primary);
    text-align: center;
    height: 28px;
    transition: border-color 0.15s;
  }
  .set-input:focus { outline: none; border-color: #555; background: #2d2d2d; }
  .inp-kg   { width: 52px; }
  .inp-reps { width: 52px; }
  .inp-rpe  { width: 44px; }

  .set-sep { font-size: 10px; color: var(--text-tertiary); }

  .del-set-btn {
    font-size: 14px;
    color: var(--text-tertiary);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    min-width: 30px;
    min-height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .del-set-btn:hover { color: #e05c5c; }

  .add-set-btn {
    font-size: 11px;
    color: var(--text-secondary);
    background: none;
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 10px;
    cursor: pointer;
    align-self: flex-start;
    margin-top: 2px;
    min-height: 32px;
    transition: background 0.15s, color 0.15s;
  }
  .add-set-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 4px;
    font-weight: 500;
  }
  .b-p      { background: var(--badge-p-bg);  color: var(--badge-p-tx); }
  .b-s      { background: var(--badge-s-bg);  color: var(--badge-s-tx); }
  .b-street { background: var(--badge-st-bg); color: var(--badge-st-tx); }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <div class="week-nav">
      <button class="top-btn" onclick="changeWeek(-1)">←</button>
      <span class="week-label" id="week-label">Week —</span>
      <button class="top-btn" id="btn-next" onclick="changeWeek(1)">→</button>
    </div>
    <span class="date-label" id="date-label"></span>
    <button class="top-btn export"     onclick="exportData()">⬆ Export</button>
    <button class="top-btn import-btn" onclick="document.getElementById('import-input').click()">⬇ Import</button>
    <input  type="file" id="import-input" accept=".json" onchange="importData(event)">
    <span   class="status-msg" id="status-msg"></span>
  </div>
  <div class="days-grid" id="days-grid"></div>
</div>

<script>
/* ── Date helpers ── */
function isoWeek(date) {
  const d   = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function mondayOfIsoWeek(week, year) {
  const simple = new Date(year, 0, 1 + (week - 1) * 7);
  const dow    = simple.getDay();
  const monday = new Date(simple);
  if (dow <= 4) monday.setDate(simple.getDate() - simple.getDay() + 1);
  else          monday.setDate(simple.getDate() + 8 - simple.getDay());
  return monday;
}

const TODAY        = new Date();
const CURRENT_WEEK = isoWeek(TODAY);
const TODAY_JS     = TODAY.getDay();
const DAY_JS_TO_IDX = { 3: 0, 4: 1, 6: 2, 0: 3 };
const TODAY_DAY_IDX = DAY_JS_TO_IDX[TODAY_JS];

let viewWeek = CURRENT_WEEK;

function updateTopBar() {
  document.getElementById('week-label').textContent = 'Week ' + viewWeek;

  const mon = mondayOfIsoWeek(viewWeek, TODAY.getFullYear());
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  const fmt = d => d.toLocaleDateString(undefined, { day: 'numeric', month: 'short' });
  const isCurrent = viewWeek === CURRENT_WEEK;
  document.getElementById('date-label').textContent =
    fmt(mon) + ' – ' + fmt(sun) + (isCurrent ? '  (this week)' : '');

  const btnNext = document.getElementById('btn-next');
  btnNext.disabled = isCurrent;
}

/* ── Programme ── */
const DAYS = [
  {
    cls: 'wed', name: 'Wednesday', sub: 'Squat + bench',
    sections: [
      { label: 'Main lifts', exercises: [
        { name: 'Primary squat',        badge: 'b-p', badgeText: 'primary'   },
        { name: 'Tempo + volume bench', badge: 'b-s', badgeText: 'secondary' },
      ]},
      { label: 'Accessories — lower 1', exercises: [
        { name: 'RDLs'           },
        { name: 'Leg press'      },
        { name: 'Lying leg curl' },
        { name: 'Leg extension'  },
        { name: 'Adductors'      },
      ]},
    ]
  },
  {
    cls: 'thu', name: 'Thursday', sub: 'Bench + deadlift',
    sections: [
      { label: 'Main lifts', exercises: [
        { name: 'Primary bench',   badge: 'b-p', badgeText: 'primary'   },
        { name: 'Volume deadlift', badge: 'b-s', badgeText: 'secondary' },
      ]},
      { label: 'Accessories — upper 1', exercises: [
        { name: 'BB rows'             },
        { name: 'Machine press'       },
        { name: 'Lat pullover'        },
        { name: 'Cable fly'           },
        { name: 'Tricep extension'    },
        { name: 'Supinated pulldowns' },
        { name: 'Facepulls'           },
      ]},
    ]
  },
  {
    cls: 'sat', name: 'Saturday', sub: 'Deadlift + squat',
    sections: [
      { label: 'Main lifts', exercises: [
        { name: 'Primary deadlift', badge: 'b-p', badgeText: 'primary'   },
        { name: 'Tempo squat',      badge: 'b-s', badgeText: 'secondary' },
      ]},
      { label: 'Accessories — lower 2', exercises: [
        { name: 'Seated leg curl'  },
        { name: 'Leg extension'    },
        { name: 'Adductor machine' },
        { name: 'Back extensions'  },
      ]},
    ]
  },
  {
    cls: 'sun', name: 'Sunday', sub: 'Streetlifting',
    sections: [
      { label: 'Main lifts', exercises: [
        { name: 'Weighted dips',     badge: 'b-street', badgeText: 'street'    },
        { name: 'Weighted pull-ups', badge: 'b-street', badgeText: 'street'    },
        { name: 'Larsen bench',      badge: 'b-s',      badgeText: 'secondary' },
      ]},
      { label: 'Accessories — upper 2', exercises: [
        { name: 'Wide grip pull-ups'  },
        { name: 'Incline DB press'    },
        { name: 'Lat pullovers'       },
        { name: 'Tricep pushdown'     },
        { name: 'Cable lateral raise' },
      ]},
    ]
  },
];

/* ── Storage ── */
function storageKey(week) { return 'gymlog-week-' + week; }

let data = {};
let autoSaveTimer = null;

function persist() {
  try { localStorage.setItem(storageKey(viewWeek), JSON.stringify(data)); } catch(e) {}
}

function loadFromStorage(week) {
  try {
    const raw = localStorage.getItem(storageKey(week));
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

/* ── Week navigation ── */
function changeWeek(delta) {
  const next = viewWeek + delta;
  if (next < 1 || next > CURRENT_WEEK) return;
  viewWeek = next;
  data     = loadFromStorage(viewWeek);
  updateTopBar();
  renderGrid();
}

/* ── Export ── */
async function exportData() {
  document.querySelectorAll('.set-input').forEach(inp => {
    data[inp.dataset.key] = inp.value;
  });
  persist();

  const filename = `gymlog-week${viewWeek}.json`;
  const json     = JSON.stringify({ week: viewWeek, saved: new Date().toISOString(), data }, null, 2);
  const blob     = new Blob([json], { type: 'application/json' });
  const file     = new File([blob], filename, { type: 'application/json' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file] });
      showStatus('✓ Exported', 'ok');
      return;
    } catch(e) {
      if (e.name === 'AbortError') return;
    }
  }

  const url = URL.createObjectURL(blob);
  const a   = Object.assign(document.createElement('a'), { href: url, download: filename });
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
  showStatus('✓ Downloaded', 'ok');
}

/* ── Import ── */
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed   = JSON.parse(e.target.result);
      const incoming = parsed.data || parsed;
      if (typeof incoming !== 'object') throw new Error();
      data = incoming;
      persist();
      renderGrid();
      showStatus('✓ Imported', 'ok');
    } catch(e) {
      showStatus('✗ Bad file', 'err');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

/* ── Status ── */
let statusTimer = null;
function showStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent   = msg;
  el.className     = 'status-msg ' + (type || '');
  el.style.display = 'inline';
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => el.style.display = 'none', 2500);
}

/* ── Build helpers ── */
function pfx(di, si, ei) { return `d${di}-s${si}-e${ei}-set`; }

function getSetCount(di, si, ei) {
  const p = pfx(di, si, ei);
  let count = 0;
  for (let i = 0; i < 20; i++) {
    if (data[`${p}${i}-kg`]   !== undefined ||
        data[`${p}${i}-reps`] !== undefined ||
        data[`${p}${i}-rpe`]  !== undefined) count = i + 1;
  }
  return Math.max(count, 1);
}

function makeSetBlock(di, si, ei, setIdx) {
  const p    = pfx(di, si, ei);
  const kgK  = `${p}${setIdx}-kg`;
  const rpK  = `${p}${setIdx}-reps`;
  const rpeK = `${p}${setIdx}-rpe`;
  return `<div class="set-block" id="setblock-${di}-${si}-${ei}-${setIdx}">
    <span class="set-num">${setIdx + 1}</span>
    <input class="set-input inp-kg"   inputmode="decimal" placeholder="kg"   data-key="${kgK}"  value="${data[kgK]  || ''}">
    <span class="set-sep">×</span>
    <input class="set-input inp-reps" inputmode="numeric" placeholder="reps" data-key="${rpK}"  value="${data[rpK]  || ''}">
    <span class="set-sep">@</span>
    <input class="set-input inp-rpe"  inputmode="decimal" placeholder="RPE"  data-key="${rpeK}" value="${data[rpeK] || ''}">
    <button class="del-set-btn" onclick="removeSet(this)">✕</button>
  </div>`;
}

/* ── Render ── */
function renderGrid() {
  const isCurrentWeek = viewWeek === CURRENT_WEEK;
  const grid = document.getElementById('days-grid');

  grid.innerHTML = DAYS.map((day, di) => {
    const isToday    = isCurrentWeek && di === TODAY_DAY_IDX;
    const todayClass = isToday ? ' today' : '';

    const sectionsHtml = day.sections.map((sec, si) => {
      const exHtml = sec.exercises.map((ex, ei) => {
        const setCount = getSetCount(di, si, ei);
        let setsHtml = '';
        for (let s = 0; s < setCount; s++) setsHtml += makeSetBlock(di, si, ei, s);
        const badge = ex.badge
          ? `<span class="badge ${ex.badge}">${ex.badgeText}</span>` : '';
        return `<div class="ex-row">
          <div class="ex-name ${ex.badge ? '' : 'sec'}">${ex.name}${badge}</div>
          <div class="col-header">
            <span style="width:14px"></span>
            <span style="width:52px;text-align:center">kg</span>
            <span style="width:10px"></span>
            <span style="width:52px;text-align:center">reps</span>
            <span style="width:10px"></span>
            <span style="width:44px;text-align:center">RPE</span>
          </div>
          <div class="sets-row" id="sets-${di}-${si}-${ei}">
            ${setsHtml}
            <button class="add-set-btn" onclick="addSet(${di},${si},${ei})">+ set</button>
          </div>
        </div>`;
      }).join('');
      return `<div class="section">
        <div class="section-label">${sec.label}</div>${exHtml}
      </div>`;
    }).join('<div class="divider"></div>');

    return `<div class="day-col ${day.cls}${todayClass}">
      <div class="day-header">
        ${day.name}
        <div class="sub">${day.sub}</div>
        <span class="today-pip">Today</span>
      </div>
      ${sectionsHtml}
    </div>`;
  }).join('');

  attachListeners(grid);
}

function attachListeners(root) {
  root.querySelectorAll('.set-input').forEach(inp => {
    inp.addEventListener('input', () => {
      data[inp.dataset.key] = inp.value;
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => {
        persist();
        showStatus('✓ Auto-saved', 'ok');
      }, 1000);
    });
  });
}

/* ── Add / Remove set ── */
function addSet(di, si, ei) {
  const container = document.getElementById(`sets-${di}-${si}-${ei}`);
  const btn       = container.querySelector('.add-set-btn');
  const setIdx    = container.querySelectorAll('.set-block').length;
  const tmp       = document.createElement('div');
  tmp.innerHTML   = makeSetBlock(di, si, ei, setIdx);
  const block     = tmp.firstElementChild;
  container.insertBefore(block, btn);
  attachListeners(block);
  block.querySelector('.set-input').focus();
}

function removeSet(btn) {
  const block = btn.closest('.set-block');
  block.querySelectorAll('.set-input').forEach(inp => delete data[inp.dataset.key]);
  block.remove();
  btn.closest('.sets-row').querySelectorAll('.set-block').forEach((b, i) => {
    b.querySelector('.set-num').textContent = i + 1;
  });
  persist();
}

/* ── Boot ── */
data = loadFromStorage(viewWeek);
updateTopBar();
renderGrid();
</script>
</body>
</html>
